image: node:20

pipelines:
  default:
    - step:
        name: Test Suite
        caches:
          - node
        script:
          - npm ci
          - npm run test
    - step:
        name: Build Frontend
        caches:
          - node
        script:
          - npm ci
          - npm run build

  custom:
    deploy-render:
      - step:
          name: Deploy to Render (manual)
          image: curlimages/curl:8.12.1
          script:
            - test -n "$RENDER_DEPLOY_HOOK_URL" || (echo "RENDER_DEPLOY_HOOK_URL is required" && exit 1)
            - curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
