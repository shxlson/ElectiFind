services:
  - type: web
    name: electifind
    env: node
    plan: free
    disk:
      name: electifind-data
      mountPath: /var/data
      sizeGB: 1
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        sync: false
      - key: DB_PATH
        value: /var/data/db.json
      - key: DATASET_PATH
        value: electives_dataset.json
